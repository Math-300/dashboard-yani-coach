version: "3.8"

# Stack para Portainer: servicio de sync NocoDB -> Supabase.
# Deploy:
#   1. En el VPS: docker build -f scripts/sync/Dockerfile -t yani-dashboard-sync:local .
#   2. En Portainer -> Stacks -> Add stack -> pegar este YAML -> Deploy
#
# El servicio corre en la overlay `Yanicoach` (misma que n8n).
# n8n_worker lo alcanza por DNS interno: http://yani_dashboard_sync:3000

services:
  yani_dashboard_sync:
    image: yani-dashboard-sync:local
    environment:
      # NocoDB (origen)
      NOCO_API_KEY: "${NOCO_API_KEY:?set NOCO_API_KEY}"
      NOCO_BASE_URL: "${NOCO_BASE_URL:-https://app.nocodb.com}"
      NOCO_BASE_ID: "${NOCO_BASE_ID:?set NOCO_BASE_ID}"

      # Supabase (destino) — OJO: service_role, NO anon
      SUPABASE_URL: "${SUPABASE_URL:?set SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY}"

      # Tenant
      TENANT_ID: "${TENANT_ID:?set TENANT_ID}"

      # Server
      PORT: "3000"
      NODE_ENV: "production"
    networks:
      - yanicoach
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        order: start-first
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  yanicoach:
    external: true
    name: Yanicoach
