version: "3.8"

# Stack para Portainer: servicio de sync NocoDB -> Supabase.
# Deploy:
#   1. En el VPS: docker build -f scripts/sync/Dockerfile -t yani-dashboard-sync:local .
#   2. En Portainer -> Stacks -> Add stack -> pegar este YAML -> Deploy
#
# El servicio corre en la overlay `Yanicoach` (misma que n8n).
# n8n_worker lo alcanza por DNS interno: http://yani_dashboard_sync:3000
#
# Las variables `VITE_*` se usan también en dev local del Dashboard (Vite carga
# .env.local). Acá se re-usan los mismos nombres para no duplicar convenciones.

services:
  yani_dashboard_sync:
    image: yani-dashboard-sync:local
    environment:
      # NocoDB (origen) — nombres obligatorios según scripts/sync/env.ts
      VITE_NOCODB_URL: "${VITE_NOCODB_URL:-https://app.nocodb.com}"
      VITE_NOCODB_TOKEN: "${VITE_NOCODB_TOKEN:?set VITE_NOCODB_TOKEN}"

      # IDs de tabla NocoDB (opcionales — tienen defaults razonables en env.ts)
      VITE_TABLE_SELLERS: "${VITE_TABLE_SELLERS:-me6kwgo0qvg0aug}"
      VITE_TABLE_CONTACTS: "${VITE_TABLE_CONTACTS:-mrwhtwissgz1xzr}"
      VITE_TABLE_INTERACTIONS: "${VITE_TABLE_INTERACTIONS:-m6gx25reozjbbt3}"
      VITE_TABLE_SALES: "${VITE_TABLE_SALES:-mm9p02mlk0i5ysy}"
      VITE_TABLE_ATTEMPTS: "${VITE_TABLE_ATTEMPTS:-mqdlglkwjvvtplc}"

      # Supabase (destino) — OJO: service_role, NO anon
      SUPABASE_URL: "${SUPABASE_URL:?set SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY}"
      SUPABASE_TENANT_SLUG: "${SUPABASE_TENANT_SLUG:-yani-coach}"

      # Server
      PORT: "3000"
      NODE_ENV: "production"
    networks:
      - yanicoach
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        order: start-first
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      # node:20-alpine no trae wget/curl. Usamos el propio node para chequear.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => r.statusCode===200?process.exit(0):process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  yanicoach:
    external: true
    name: Yanicoach
